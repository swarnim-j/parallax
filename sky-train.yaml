name: parallax-train

resources:
  cloud: aws
  accelerators: L40S:1
  use_spot: false
  disk_size: 100
  region: us-east-1

workdir: .

setup: |
  set -ex
  pip install uv
  uv venv .venv --python 3.11
  source .venv/bin/activate
  uv pip install torch --index-url https://download.pytorch.org/whl/cu121
  uv pip install fair-esm numpy biopython scikit-learn requests fastapi uvicorn

  # Clone ProteinMPNN
  git clone https://github.com/dauparas/ProteinMPNN.git || true

run: |
  set -ex
  source .venv/bin/activate

  echo "=== Building database (fetch + structures + ProteinMPNN + embed) ==="
  python build_db.py

  echo "=== Fine-tuning ESM-2 ==="
  python train.py

  echo "=== Results ==="
  ls -lh data/hazard_db/ data/benign_db/ data/finetuned/ data/classifier/
  echo "Done. Run: sky rsync parallax-train:~/sky_workdir/data/ data/"

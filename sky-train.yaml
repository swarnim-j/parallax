name: parallax-train

resources:
  cloud: gcp
  accelerators: A100-80GB:1
  use_spot: true
  disk_size: 100
  any_of:
    - region: us-central1
    - region: us-east4
    - region: us-west1
    - region: us-west4
    - region: us-east1

workdir: .

setup: |
  set -ex
  pip install uv
  uv venv .venv --python 3.11
  source .venv/bin/activate
  uv pip install torch --index-url https://download.pytorch.org/whl/cu121
  uv pip install fair-esm numpy biopython scikit-learn requests

  git clone https://github.com/dauparas/ProteinMPNN.git || true
